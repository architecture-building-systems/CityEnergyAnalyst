# Centralised tooltip content for the CEA GUI.
# Keys are referenced by frontend components.
# Each entry has: title (optional), body (required for rich tooltips).

# Pathway Builder
pathway-builder:
  title: Pathway Builder
  body: >-
    A CEA Pathway defines how a district evolves over time, which buildings
    are constructed, demolished, or retrofitted at each year.
    Create multiple Pathways to compare different development scenarios
    and the impact of different decarbonisation strategies.

create-new-pathway:
  body: Create new pathway

define-intervention-template:
  body: Define intervention template

intervention-templates:
  title: Intervention Templates
  body: >-
    Reusable modification recipes (e.g. wall insulation upgrade, HVAC retrofit)
    that change building properties for selected Archetypes.
    Define once, apply to any year across any Pathway.

refresh-pathway:
  body: Refresh

simulate-pathway:
  title: Simulate Pathway
  body: |-
    To enable, ensure:
    1. Only one Pathway is checked
    2. All states are baked (blue nodes)

add-building-event-or-intervention:
  title: Add a Building Event or Apply an Intervention
  body: >-
    Enter a year, then choose an action. Select an intervention
    template to apply it directly. Clear the selection to add a
    building event instead.

bake-states:
  title: Bake States
  body: >-
    Bake materialises state folders from the pathway log.
    Run after creating building events or applying interventions.
    Required before simulation.

state-types:
  title: State Types
  body: |-
    Auto-Stock: Buildings with a construction year matching this state year.
    Construct-Event: Buildings explicitly added in this year.
    Demolish-Event: Buildings explicitly removed in this year.
    Intervention: Building property modifications applied via intervention templates.

# Inspector section cards
construction-card:
  title: Construction
  body: >-
    Buildings constructed in this state year. A building with (N) indicates
    it has been rebuilt N times after demolition.

demolition-card:
  title: Demolition
  body: Buildings demolished in this state year.

intervention-card:
  title: Intervention
  body: >-
    Building property modifications applied via intervention templates
    for the listed archetypes.

# Building lifecycle
building-lifecycle:
  title: Building Lifecycle
  body: >-
    Timeline of this building's construction and demolition events across the pathway.
    Blue nodes indicate construction, red nodes indicate demolition.
    Dashed lines show gaps where the building does not exist.

# Map legends
construction-archetypes-info:
  body: >-
    Construction Archetypes define the building envelope and systems standards.
    Assign in Input Editor > zone (const_type).
    Edit or add in Database Editor > CONSTRUCTION_ARCHETYPES.

main-use-type-info:
  body: >-
    Main use type is the use type with the highest occupancy ratio.
    Assign in Input Editor > zone (use_type1, use_type2, use_type3 and their ratios).
    Edit or add in Database Editor > USE_TYPES.
