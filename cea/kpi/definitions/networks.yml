          description: District heating (DH) or district cooling (DC).
        plan_name:
          label: Phasing plan
          options_generator: phasing_plans
          default: ""
          description: Which phasing plan to read.
        phase:
          label: Phase
          options_generator: phases_for_plan
          default: ""
